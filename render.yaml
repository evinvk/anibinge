services:
  - type: web
    name: anibinge-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        fromDatabase:
          name: anibinge-db
          property: connectionString
    healthCheckPath: /api/health
    healthCheckProtocol: http

databases:
  - name: anibinge-db
    plan: free
