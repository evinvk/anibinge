services:
  - type: web
    name: anibinge-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -w 2 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        fromDatabase:
          name: anibinge-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: ANIMESCHEDULE_API_TOKEN
        sync: false
    healthCheckPath: /api/health
    healthCheckProtocol: http

databases:
  - name: anibinge-db
    plan: free
