name: Keep Backend Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -sf https://anibinge-backend-k6td.onrender.com/api/health || exit 1
          echo "Backend pinged successfully at $(date)"
